<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OL-Cesium Tokyo Example</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v9.0.0/ol.css">
<style>
  html, body, #map {
    width:100%;
    height:100%;
    margin:0;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/ol@v9.0.0/dist/ol.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ol-cesium@2.13.0/dist/olcesium.js"></script>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
</head>

<body>
<div id="map"></div>

<script>

// --------------------------------------------------------
// OpenLayers 2Dマップ
// --------------------------------------------------------
const centerTokyo = ol.proj.fromLonLat([139.7671, 35.6812]);

const olMap = new ol.Map({
  target: 'map',
  view: new ol.View({
    center: centerTokyo,
    zoom: 16
  }),
  layers: [
    new ol.layer.Tile({
      source: new ol.source.OSM()
    })
  ]
});

// --------------------------------------------------------
// OL-Cesium で 3D切り替え
// --------------------------------------------------------
const ol3d = new olcs.OLCesium({map: olMap});

// OL-Cesium を有効にする
const scene = ol3d.getCesiumScene();
ol3d.setEnabled(true); // 最初から3D表示にする場合

// カメラ初期位置（Cesium）
scene.camera.setView({
  destination: Cesium.Cartesian3.fromDegrees(
    139.7671,  // 経度
    35.6812,   // 緯度
    1500       // 高度（東京駅付近）
  )
});

// もし建物3Dを表示したい場合（Cesium ion トークン必要）
/*

Cesium.Cesium3DTileset.fromUrl('https://assets.cesium.com/96188/tileset.json')
  .then(tileset => scene.primitives.add(tileset));
*/

</script>
</body>
</html>
